# Cloud Run configuration for dnd-game-master-client.
#
# BACKEND_ORIGIN is the single source of truth for the FastAPI backend URL.
# deploy.sh reads it from here and passes it as a Docker BUILD ARG (Next.js bakes
# the proxy destination into the build — a runtime env var alone would NOT work).
#
# This value is NOT secret (it's the public Cloud Run backend URL), so this file
# is committed. If you ever add a real secret here, gitignore it first.
BACKEND_ORIGIN: "https://dnd-dungeon-master-agent-101298305706.us-east1.run.app"
