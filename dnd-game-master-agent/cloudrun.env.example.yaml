# Cloud Run environment variables for dnd-game-master-agent.
# Consumed by deploy.sh via `gcloud run deploy --env-vars-file`.
#
# ── SECURITY ────────────────────────────────────────────────────────────────
# This file holds real secrets once you fill it in. It is gitignored and
# dockerignored so it is NOT committed and NOT uploaded with `--source`.
#
# NOTE: leave SESSION_SERVICE_URI unset — services.py then uses the local
# SQLite store that session_store.py syncs to MongoDB. Do NOT add it here.

# ── Model / LLM ──────────────────────────────────────────────────────────────
GOOGLE_MODEL: "gemini-3.1-flash-lite"
SMART_MODEL: "gemini-3.5-flash"
GOOGLE_API_KEY: ""
USE_LOCAL_LLM: "0"
SESSION_DB_LOCAL: "1"

# ── MongoDB (durable campaigns + session/event sync) ────────────────────────
MONGO_URI: ""          # mongodb+srv://user:pass@cluster/...
DB_NAME: "DnD"
CAMPAIGN_COLLECTION: "campaigns"
SESSION_COLLECTION: "sessions"
EVENT_COLLECTION: "events"

# ── App config ───────────────────────────────────────────────────────────────
LOG_LEVEL: "INFO"
# Comma-separated browser origins allowed by CORS. Set to your deployed
# frontend origin, or leave empty if the client calls via a same-origin proxy.
ALLOW_ORIGINS: "http://localhost:8080,https://dnd-dungeon-master-client-101298305706.us-east1.run.app"
